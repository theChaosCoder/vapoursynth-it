name: CI

on:
  push:
    branches: [main]
    # Don't double-run on tag push — the release workflow already builds
    # and tests there, and CI on tags adds nothing.
    tags-ignore:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: "0.16.0"

jobs:
  build:
    name: fmt + test + cross
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check formatting
        run: zig fmt --check src build.zig build.zig.zon

      - name: Run unit tests
        run: zig build test --summary all

      - name: Build all five platform binaries
        # The `cross` step in build.zig deposits each artefact under a
        # predictable `zig-out/<name>/` subdirectory; that's more reliable
        # than the per-target install layout (Zig drops Windows DLLs into
        # `zig-out/bin/` rather than `lib/`, for instance, which trips up
        # a naive matrix upload).
        run: zig build cross

      - name: List built artefacts
        run: find zig-out -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) | sort

      - uses: actions/upload-artifact@v5
        with:
          name: libzit-linux-x86_64
          path: zig-out/linux-x86_64/libzit.so
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: libzit-linux-aarch64
          path: zig-out/linux-aarch64/libzit.so
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: libzit-macos-x86_64
          path: zig-out/macos-x86_64/libzit.dylib
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: libzit-macos-aarch64
          path: zig-out/macos-aarch64/libzit.dylib
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: libzit-windows-x86_64
          path: zig-out/windows-x86_64/zit.dll
          if-no-files-found: error

  # The VapourSynth PyPI wheel bundles both libvapoursynth.so and the
  # vspipe binary on Linux, so a plain `pip install` is enough — no PPA
  # dance or system VapourSynth required. The upstream-reference build
  # is still best-effort because it needs system headers we don't have.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VapourSynth + test deps
        run: pip install VapourSynth pytest numpy

      - name: Build the Zig plugin
        run: zig build --release=fast

      - name: Build the upstream API-4 reference plugin (best effort)
        continue-on-error: true
        run: scripts/build_upstream_api4.sh

      - name: Run pytest
        env:
          PYTHONPATH: scripts
        run: |
          python -c "import vapoursynth as vs; print(vs.core)"
          pytest tests/integration -v
